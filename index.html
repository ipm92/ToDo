<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pendientes" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Mis Pendientes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #F7F6F3; color: #1a1a1a; font-family: 'Inter', sans-serif; min-height: 100vh; }
    input, button, textarea { font-family: 'Inter', sans-serif; }
    input, textarea { outline: none; -webkit-appearance: none; }
    input:focus, textarea:focus { border-color: #1a1a1a !important; }
    button { cursor: pointer; border: none; background: none; }
    button:active { opacity: .7; transform: scale(.98); }
    .fade { animation: fi .25s ease; }
    @keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    ::-webkit-scrollbar { width: 0; }
    .safe-top  { padding-top: env(safe-area-inset-top); }
    .safe-bot  { padding-bottom: calc(60px + env(safe-area-inset-bottom)); }
    .task-row { transition: opacity .15s; }
    .drag-handle { transition: opacity .1s; }
    .drag-handle:active { opacity: .4; }
    [data-zone] { transition: background .12s, outline-color .12s; }
    .zone-active { background: rgba(61,173,127,0.08) !important; outline: 2px dashed #3DAD7F; outline-offset: 3px; border-radius: 14px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>

// ── Config Supabase ────────────────────────────────────────────────────
const SUPABASE_URL = "https://xguzppefwanjvonlpwxs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhndXpwcGVmd2FuanZvbmxwd3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzQ0NTMsImV4cCI6MjA5NDgxMDQ1M30.Q1v3wlDLgwaoOQ767VoQwoFCl3lAWbCowylh1cQ5lG8";
const API = SUPABASE_URL + "/rest/v1/pendientes";

function xhr(method, url, body) {
  return new Promise((resolve, reject) => {
    const r = new XMLHttpRequest();
    r.open(method, url, true);
    r.setRequestHeader("Content-Type", "application/json");
    r.setRequestHeader("apikey", SUPABASE_KEY);
    r.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
    r.setRequestHeader("Prefer", "return=representation");
    r.timeout = 12000;
    r.ontimeout = () => reject(new Error("Timeout - sin conexión"));
    r.onerror   = () => reject(new Error("Error de red"));
    r.onload    = () => {
      if (r.status >= 200 && r.status < 300) {
        try { resolve(JSON.parse(r.responseText)); } catch(e) { resolve([]); }
      } else {
        reject(new Error("Error " + r.status + ": " + r.responseText));
      }
    };
    r.send(body ? JSON.stringify(body) : null);
  });
}
async function dbCargar() {
  return await xhr("GET", API + "?order=created_at.asc&apikey=" + SUPABASE_KEY);
}
async function dbGuardar(obj) {
  const res = await xhr("POST", API + "?apikey=" + SUPABASE_KEY, obj);
  return Array.isArray(res) ? res[0] : res;
}
async function dbActualizar(id, obj) {
  const res = await xhr("PATCH", API + "?id=eq." + id + "&apikey=" + SUPABASE_KEY, obj);
  return Array.isArray(res) ? res[0] : res;
}
async function dbEliminar(id) {
  await xhr("DELETE", API + "?id=eq." + id + "&apikey=" + SUPABASE_KEY);
}

// ── Datos ──────────────────────────────────────────────────────────────
const CATEGORIAS = [
  { id:"release",    label:"Release",   color:"#EF6C04" },
  { id:"cardolan",   label:"Cardolán",  color:"#0A8043" },
  { id:"social",     label:"Social",    color:"#7BB443" },
  { id:"gestion",    label:"Gestión",   color:"#BFC932" },
  { id:"matrimonio", label:"Matrimonio",color:"#8E24AA" },
];
const DIAS = [
  { id:"lunes",     label:"Lunes" },
  { id:"martes",    label:"Martes" },
  { id:"miercoles", label:"Miércoles" },
  { id:"jueves",    label:"Jueves" },
  { id:"viernes",   label:"Viernes" },
];

function getCategoria(id) { return CATEGORIAS.find(c=>c.id===id) || CATEGORIAS[0]; }
function diaLabel(id) { const d = DIAS.find(x=>x.id===id); return d ? d.label : ""; }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function formVacio() { return { texto:"", categoria:"release" }; }

// ── Estado ─────────────────────────────────────────────────────────────
const S = {
  tasks: [],
  mostrarForm: false,
  form: formVacio(),
  eliminarId: null,
  confirmSemana: false,
};

const LBL = `font-size:11px;font-weight:500;color:#999;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:block;`;
const INP = `width:100%;background:#fff;border:1.5px solid #E8E6E1;border-radius:10px;padding:11px 14px;color:#1a1a1a;font-size:15px;transition:border-color .15s;`;

// ── Render ──────────────────────────────────────────────────────────────
function emptyZoneHTML(msg) {
  return `<div style="background:#fff;border:1.5px dashed #E8E6E1;border-radius:12px;padding:18px;text-align:center;"><p style="font-size:12px;color:#ccc;">${msg}</p></div>`;
}

function taskRowHTML(t, i, total, isDone) {
  const cat = getCategoria(t.categoria);
  const isFirst = i===0, isLast = i===total-1;
  const rad = isFirst&&isLast ? "12px" : isFirst ? "12px 12px 4px 4px" : isLast ? "4px 4px 12px 12px" : "4px";
  return `
  <div class="task-row" data-id="${t.id}" style="background:#fff;border-radius:${rad};padding:13px 14px;display:flex;align-items:center;gap:11px;opacity:${isDone?0.55:1};">
    <button onclick="toggleCompletado(${t.id})" style="width:22px;height:22px;border-radius:50%;border:1.5px solid ${isDone?cat.color:'#E0DDD7'};background:${isDone?cat.color:'#fff'};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;">${isDone?'✓':''}</button>
    <div style="width:3px;min-height:30px;border-radius:2px;flex-shrink:0;background:${cat.color};"></div>
    <div style="flex:1;min-width:0;">
      <p style="font-size:14.5px;font-weight:600;color:${isDone?'#aaa':'#1a1a1a'};${isDone?'text-decoration:line-through;':''}overflow:hidden;text-overflow:ellipsis;">${esc(t.texto)}</p>
      <div style="display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;">
        <span style="font-size:11px;font-weight:500;color:${cat.color};background:${cat.color}14;padding:2px 8px;border-radius:20px;">${cat.label}</span>
        ${t.estado==='semana'&&t.dia?`<span style="font-size:11px;color:#bbb;">${diaLabel(t.dia)}</span>`:''}
      </div>
    </div>
    ${S.eliminarId===t.id ? `
      <div style="display:flex;gap:5px;flex-shrink:0;">
        <button onclick="accionEliminar(${t.id})" style="font-size:11px;font-weight:600;color:#D94F3D;background:#D94F3D14;border-radius:6px;padding:4px 9px;">Eliminar</button>
        <button onclick="S.eliminarId=null;render()" style="font-size:11px;color:#999;background:#F0EDE8;border-radius:6px;padding:4px 9px;">Cancelar</button>
      </div>` : `
      <button onclick="S.eliminarId=${t.id};render()" style="font-size:16px;color:#ddd;flex-shrink:0;line-height:1;">×</button>
      ${!isDone ? `<div class="drag-handle" onpointerdown="iniciarDrag(event,${t.id})" style="touch-action:none;cursor:grab;color:#ccc;font-size:17px;padding:4px 2px;flex-shrink:0;line-height:1;">≡</div>` : ''}
    `}
  </div>`;
}

function renderMaestra() {
  const pend = S.tasks.filter(t=>t.estado==='maestra');
  const activos = pend.filter(t=>!t.completado);
  const hechos  = pend.filter(t=>t.completado);
  return `
  <div style="margin-top:24px;">
    <p style="${LBL}">Lista maestra · ${activos.length}</p>
    <div data-zone="maestra" style="display:flex;flex-direction:column;gap:1px;min-height:50px;">
      ${activos.length===0 ? emptyZoneHTML('Arrastra aquí los pendientes que sueltes de la semana') : activos.map((t,i)=>taskRowHTML(t,i,activos.length,false)).join('')}
    </div>
    ${hechos.length>0 ? `
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:1px;">
      ${hechos.map((t,i)=>taskRowHTML(t,i,hechos.length,true)).join('')}
    </div>` : ''}
  </div>`;
}

function renderDia(d) {
  const tareas  = S.tasks.filter(t=>t.estado==='semana' && t.dia===d.id);
  const activos = tareas.filter(t=>!t.completado);
  const hechos  = tareas.filter(t=>t.completado);
  return `
  <div style="margin-bottom:16px;">
    <p style="font-size:12px;font-weight:600;color:#999;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;">${d.label}</p>
    <div data-zone="semana" data-dia="${d.id}" style="display:flex;flex-direction:column;gap:1px;min-height:46px;">
      ${activos.length===0 && hechos.length===0 ? emptyZoneHTML('Sin pendientes') : ''}
      ${activos.map((t,i)=>taskRowHTML(t,i,activos.length,false)).join('')}
      ${hechos.map((t,i)=>taskRowHTML(t,i,hechos.length,true)).join('')}
    </div>
  </div>`;
}

function renderSemana() {
  return `
  <div style="margin-top:30px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <p style="${LBL}margin-bottom:0;">Esta semana</p>
      <button onclick="S.confirmSemana=true;render()" style="font-size:12px;font-weight:600;color:#777;background:#fff;border:1.5px solid #E8E6E1;border-radius:20px;padding:6px 14px;">Planear nueva semana</button>
    </div>
    ${DIAS.map(d=>renderDia(d)).join('')}
  </div>`;
}

function renderForm() {
  const f = S.form;
  return `
  <div class="fade" style="background:#fff;border:1px solid #E8E6E1;border-radius:16px;padding:20px;margin-top:16px;">
    <div style="margin-bottom:16px;">
      <label style="${LBL}">Pendiente</label>
      <input id="f-texto" type="text" value="${esc(f.texto)}" oninput="S.form.texto=this.value;actualizarBtnForm()"
        placeholder="Ej. Confirmar catering" style="${INP}" />
    </div>
    <div style="margin-bottom:18px;">
      <label style="${LBL}">Categoría</label>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${CATEGORIAS.map(c=>`
          <button onclick="S.form.categoria='${c.id}';render()" style="padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;text-align:left;background:${f.categoria===c.id?c.color+'14':'#F7F6F3'};color:${f.categoria===c.id?c.color:'#555'};border:1.5px solid ${f.categoria===c.id?c.color+'55':'#E8E6E1'};">${c.label}</button>`).join('')}
      </div>
    </div>
    <button id="btn-agregar" onclick="accionGuardar()" style="width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;background:${f.texto.trim()?'#1a1a1a':'#E8E6E1'};color:${f.texto.trim()?'#fff':'#aaa'};">Agregar</button>
  </div>`;
}

function renderConfirmSemana() {
  const semana = S.tasks.filter(t=>t.estado==='semana');
  const completados = semana.filter(t=>t.completado).length;
  const pendientes  = semana.filter(t=>!t.completado).length;
  return `
  <div onclick="if(event.target===this){S.confirmSemana=false;render();}" style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:24px;z-index:10000;">
    <div style="background:#fff;border-radius:16px;padding:24px;max-width:340px;width:100%;">
      <p style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#1a1a1a;margin-bottom:10px;">Planear nueva semana</p>
      <p style="font-size:13.5px;color:#777;line-height:1.5;margin-bottom:18px;">Se eliminarán ${completados} pendiente${completados!==1?'s':''} completado${completados!==1?'s':''} de la semana, y ${pendientes} pendiente${pendientes!==1?'s':''} sin terminar volverá${pendientes===1?'':'n'} a la lista maestra.</p>
      <div style="display:flex;gap:8px;">
        <button onclick="S.confirmSemana=false;render()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:500;background:#F0EDE8;color:#888;">Cancelar</button>
        <button onclick="ejecutarPlanearSemana()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;background:#1a1a1a;color:#fff;">Confirmar</button>
      </div>
    </div>
  </div>`;
}

function render() {
  document.getElementById("app").innerHTML = `
  <div style="min-height:100vh;background:#F7F6F3;">
    <div class="safe-top" style="background:#fff;border-bottom:1px solid #E8E6E1;padding:20px 20px 16px;">
      <div style="max-width:560px;margin:0 auto;">
        <p style="font-size:11px;font-weight:500;color:#bbb;letter-spacing:1px;text-transform:uppercase;">Plan semanal</p>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
          <h1 style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#1a1a1a;">Pendientes</h1>
          <button onclick="toggleForm()" style="width:38px;height:38px;border-radius:50%;background:${S.mostrarForm?"#f0ede8":"#1a1a1a"};color:${S.mostrarForm?"#999":"#fff"};font-size:20px;display:flex;align-items:center;justify-content:center;">
            ${S.mostrarForm?"×":"+"}
          </button>
        </div>
      </div>
    </div>
    <div class="safe-bot" style="max-width:560px;margin:0 auto;padding:0 16px;">
      ${S.mostrarForm ? renderForm() : ''}
      ${renderMaestra()}
      ${renderSemana()}
    </div>
  </div>
  ${S.confirmSemana ? renderConfirmSemana() : ''}`;
}

// ── Acciones ────────────────────────────────────────────────────────────
function toggleForm() {
  S.mostrarForm = !S.mostrarForm;
  if (S.mostrarForm) S.form = formVacio();
  render();
  if (S.mostrarForm) setTimeout(() => { const i = document.getElementById("f-texto"); if(i) i.focus(); }, 150);
}

function actualizarBtnForm() {
  const btn = document.getElementById("btn-agregar");
  if (!btn) return;
  const ok = S.form.texto.trim().length > 0;
  btn.style.background = ok ? "#1a1a1a" : "#E8E6E1";
  btn.style.color = ok ? "#fff" : "#aaa";
}

async function accionGuardar() {
  const texto = (S.form.texto || "").trim();
  if (!texto) { alert("Escribe el pendiente"); return; }
  const btn = document.getElementById("btn-agregar");
  if (btn) { btn.innerText = "Guardando..."; btn.style.opacity = ".6"; btn.disabled = true; }
  const obj = { texto, categoria: S.form.categoria, estado: "maestra", dia: null, completado: false };
  try {
    const guardado = await dbGuardar(obj);
    if (guardado) S.tasks.push(guardado);
    S.form = formVacio();
    S.mostrarForm = false;
    render();
  } catch(e) {
    alert("Error al guardar: " + e.message);
    if (btn) { btn.innerText = "Agregar"; btn.style.opacity = "1"; btn.disabled = false; }
  }
}

async function toggleCompletado(id) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  const nuevo = !t.completado;
  S.tasks = S.tasks.map(x=>x.id===id?{...x,completado:nuevo}:x);
  render();
  try { await dbActualizar(id, {completado:nuevo}); } catch(e) { alert("Error: " + e.message); }
}

async function accionEliminar(id) {
  try {
    await dbEliminar(id);
    S.tasks = S.tasks.filter(t=>t.id!==id);
    S.eliminarId = null;
    render();
  } catch(e) { alert("Error al eliminar: " + e.message); }
}

async function moverTask(id, zona, dia) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  if (t.estado===zona && (t.dia||null)===(dia||null)) return;
  const obj = zona==="maestra" ? {estado:"maestra", dia:null} : {estado:"semana", dia:dia};
  S.tasks = S.tasks.map(x=>x.id===id?{...x,...obj}:x);
  render();
  try { await dbActualizar(id, obj); } catch(e) { alert("Error al mover: " + e.message); }
}

async function ejecutarPlanearSemana() {
  const semana = S.tasks.filter(t=>t.estado==='semana');
  const aEliminar = semana.filter(t=>t.completado);
  const aRegresar = semana.filter(t=>!t.completado);
  S.confirmSemana = false;
  render();
  try {
    await Promise.all(aEliminar.map(t=>dbEliminar(t.id)));
    await Promise.all(aRegresar.map(t=>dbActualizar(t.id, {estado:"maestra", dia:null})));
    const eliminarIds = new Set(aEliminar.map(t=>t.id));
    const regresarIds = new Set(aRegresar.map(t=>t.id));
    S.tasks = S.tasks
      .filter(t=>!eliminarIds.has(t.id))
      .map(t=> regresarIds.has(t.id) ? {...t, estado:"maestra", dia:null} : t);
    render();
  } catch(e) {
    alert("Error: " + e.message);
    render();
  }
}

// ── Drag & drop (pointer events: funciona con mouse y touch) ───────────
let dragState = null;

function iniciarDrag(e, id) {
  e.preventDefault();
  const handle = e.currentTarget;
  try { handle.setPointerCapture(e.pointerId); } catch(err) {}
  const row = handle.closest(".task-row");
  if (!row) return;
  const rect = row.getBoundingClientRect();
  const ghost = row.cloneNode(true);
  ghost.style.position = "fixed";
  ghost.style.top = rect.top + "px";
  ghost.style.left = rect.left + "px";
  ghost.style.width = rect.width + "px";
  ghost.style.zIndex = "9999";
  ghost.style.pointerEvents = "none";
  ghost.style.boxShadow = "0 10px 30px rgba(0,0,0,.18)";
  ghost.style.borderRadius = "12px";
  ghost.style.transform = "scale(1.02) rotate(-1deg)";
  document.body.appendChild(ghost);
  row.style.opacity = "0.25";
  dragState = { id, ghost, row, startX:e.clientX, startY:e.clientY, origTop:rect.top, origLeft:rect.left, zoneEl:null };
  document.addEventListener("pointermove", moverDrag);
  document.addEventListener("pointerup", soltarDrag);
}

function moverDrag(e) {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  dragState.ghost.style.top = (dragState.origTop + dy) + "px";
  dragState.ghost.style.left = (dragState.origLeft + dx) + "px";
  dragState.ghost.style.display = "none";
  const el = document.elementFromPoint(e.clientX, e.clientY);
  dragState.ghost.style.display = "";
  document.querySelectorAll("[data-zone]").forEach(z=>z.classList.remove("zone-active"));
  const zoneEl = el ? el.closest("[data-zone]") : null;
  if (zoneEl) zoneEl.classList.add("zone-active");
  dragState.zoneEl = zoneEl;
}

function soltarDrag(e) {
  if (!dragState) return;
  document.removeEventListener("pointermove", moverDrag);
  document.removeEventListener("pointerup", soltarDrag);
  document.querySelectorAll("[data-zone]").forEach(z=>z.classList.remove("zone-active"));
  dragState.ghost.remove();
  if (dragState.row) dragState.row.style.opacity = "1";
  const { id, zoneEl } = dragState;
  dragState = null;
  if (zoneEl) {
    const zona = zoneEl.dataset.zone;
    const dia = zoneEl.dataset.dia || null;
    moverTask(id, zona, dia);
  }
}

// ── Init ────────────────────────────────────────────────────────────────
function iniciarApp() {
  document.getElementById("app").innerHTML = `
    <div style="min-height:100vh;background:#F7F6F3;display:flex;align-items:center;justify-content:center;">
      <p style="font-size:13px;color:#bbb;font-weight:500;letter-spacing:1px;">Cargando...</p>
    </div>`;
  dbCargar()
    .then(data => { S.tasks = data || []; render(); })
    .catch(e => {
      document.getElementById("app").innerHTML = `
        <div style="min-height:100vh;background:#F7F6F3;display:flex;align-items:center;justify-content:center;padding:24px;">
          <p style="font-size:13px;color:#D94F3D;text-align:center;">Error al conectar:<br>${e.message}</p>
        </div>`;
    });
}

iniciarApp();

</script>
</body>
</html>
