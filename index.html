function xhr(method, url, body) {
  return new Promise((resolve, reject) => {
    const r = new XMLHttpRequest();
    r.open(method, url, true);
    r.setRequestHeader("Content-Type", "application/json");
    r.setRequestHeader("apikey", SUPABASE_KEY);
    r.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
    r.setRequestHeader("Prefer", "return=representation");
    r.timeout = 12000;
    r.ontimeout = () => reject(new Error("Timeout - sin conexión"));
    r.onerror   = () => reject(new Error("Error de red"));
    r.onload    = () => {
      if (r.status >= 200 && r.status < 300) {
        try { resolve(JSON.parse(r.responseText)); } catch(e) { resolve([]); }
      } else {
        reject(new Error("Error " + r.status + ": " + r.responseText));
      }
    };
    r.send(body ? JSON.stringify(body) : null);
  });
}

async function importarLista() {
  if (!confirm("Vas a importar " + IMPORT_ITEMS.length + " pendientes a la lista maestra. ¿Continuar?")) return;
  const btn = document.getElementById("btn-importar");
  if (btn) { btn.innerText = "Importando..."; btn.disabled = true; }
  for (const item of IMPORT_ITEMS) {
    try {
      const guardado = await dbGuardar({ texto:item.texto, categoria:item.categoria, estado:"maestra", dia:null, completado:false });
      if (guardado) S.tasks.push(guardado);
    } catch(e) { console.error("Error importando:", item.texto, e); }
  }
  localStorage.setItem(IMPORT_KEY, "1");
  render();
}

      <p style="font-size:13.5px;color:#777;line-height:1.5;margin-bottom:18px;">Se eliminarán ${completados} pendiente${completados!==1?'s':''} completado${completados!==1?'s':''} de la semana, y ${pendientes} pendiente${pendientes!==1?'s':''} sin terminar volverá${pendientes===1?'':'n'} a la lista maestra.</p>
      <div style="display:flex;gap:8px;">
        <button onclick="S.confirmSemana=false;render()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:500;background:#F0EDE8;color:#888;">Cancelar</button>
        <button onclick="ejecutarPlanearSemana()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;background:#1a1a1a;color:#fff;">Confirmar</button>
      </div>
    </div>
  </div>`;
}

function render() {
  document.getElementById("app").innerHTML = `
  <div style="min-height:100vh;background:#F7F6F3;">
    <div class="safe-top" style="background:#fff;border-bottom:1px solid #E8E6E1;padding:20px 20px 16px;">
      <div style="max-width:560px;margin:0 auto;">
        <p style="font-size:11px;font-weight:500;color:#bbb;letter-spacing:1px;text-transform:uppercase;">Plan semanal</p>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
          <h1 style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#1a1a1a;">Planeación</h1>
          <button onclick="toggleForm()" style="width:38px;height:38px;border-radius:50%;background:${S.mostrarForm?"#f0ede8":"#1a1a1a"};color:${S.mostrarForm?"#999":"#fff"};font-size:20px;display:flex;align-items:center;justify-content:center;">
            ${S.mostrarForm?"×":"+"}
          </button>
        </div>
      </div>
    </div>
    <div class="safe-bot" style="max-width:560px;margin:0 auto;padding:0 16px;">
      ${(!localStorage.getItem(IMPORT_KEY) && IMPORT_ITEMS.length>0) ? `
      <div class="fade" style="background:#fff;border:1.5px dashed #E8E6E1;border-radius:14px;padding:16px;margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <p style="font-size:13px;color:#777;line-height:1.4;">Tienes ${IMPORT_ITEMS.length} pendientes de tu libreta listos para importar a la lista maestra</p>
        <button id="btn-importar" onclick="importarLista()" style="font-size:13px;font-weight:600;color:#fff;background:#1a1a1a;border-radius:20px;padding:8px 16px;flex-shrink:0;white-space:nowrap;">Importar</button>
      </div>` : ''}
      ${S.mostrarForm ? renderForm() : ''}
      ${renderMaestra()}
      ${renderEnfoques()}
      ${renderSemana()}
    </div>
  </div>
  ${S.confirmSemana ? renderConfirmSemana() : ''}`;
}

// ── Acciones ────────────────────────────────────────────────────────────
function toggleForm() {
  S.mostrarForm = !S.mostrarForm;
  if (S.mostrarForm) S.form = formVacio();
  render();
  if (S.mostrarForm) setTimeout(() => { const i = document.getElementById("f-texto"); if(i) i.focus(); }, 150);
}

function actualizarBtnForm() {
  const btn = document.getElementById("btn-agregar");
  if (!btn) return;
  const ok = S.form.texto.trim().length > 0;
  btn.style.background = ok ? "#1a1a1a" : "#E8E6E1";
  btn.style.color = ok ? "#fff" : "#aaa";
}

async function accionGuardar() {
  const texto = (S.form.texto || "").trim();
  if (!texto) { alert("Escribe el pendiente"); return; }
  const btn = document.getElementById("btn-agregar");
  if (btn) { btn.innerText = "Guardando..."; btn.style.opacity = ".6"; btn.disabled = true; }
  const obj = { texto, categoria: S.form.categoria, estado: "maestra", dia: null, completado: false };
  try {
    const guardado = await dbGuardar(obj);
    if (guardado) S.tasks.push(guardado);
    S.form = formVacio();
    S.mostrarForm = false;
    render();
  } catch(e) {
    alert("Error al guardar: " + e.message);
    if (btn) { btn.innerText = "Agregar"; btn.style.opacity = "1"; btn.disabled = false; }
  }
}

async function toggleCompletado(id) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  const nuevo = !t.completado;
  S.tasks = S.tasks.map(x=>x.id===id?{...x,completado:nuevo}:x);
  render();
  try { await dbActualizar(id, {completado:nuevo}); } catch(e) { alert("Error: " + e.message); }
}

async function accionEliminar(id) {
  try {
    await dbEliminar(id);
    S.tasks = S.tasks.filter(t=>t.id!==id);
    S.eliminarId = null;
    render();
  } catch(e) { alert("Error al eliminar: " + e.message); }
}

async function moverTask(id, zona, dia) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  if (t.estado===zona && (t.dia||null)===(dia||null)) return;
  const obj = zona==="maestra" ? {estado:"maestra", dia:null} : {estado:"semana", dia:dia};
  S.tasks = S.tasks.map(x=>x.id===id?{...x,...obj}:x);
  render();
  try { await dbActualizar(id, obj); } catch(e) { alert("Error al mover: " + e.message); }
}

async function ejecutarPlanearSemana() {
  const semana = S.tasks.filter(t=>t.estado==='semana');
  const aEliminar = semana.filter(t=>t.completado);
  const aRegresar = semana.filter(t=>!t.completado);
  S.confirmSemana = false;
  render();
  try {
    await Promise.all(aEliminar.map(t=>dbEliminar(t.id)));
    await Promise.all(aRegresar.map(t=>dbActualizar(t.id, {estado:"maestra", dia:null})));
    const eliminarIds = new Set(aEliminar.map(t=>t.id));
    const regresarIds = new Set(aRegresar.map(t=>t.id));
    S.tasks = S.tasks
      .filter(t=>!eliminarIds.has(t.id))
      .map(t=> regresarIds.has(t.id) ? {...t, estado:"maestra", dia:null} : t);
    render();
  } catch(e) {
    alert("Error: " + e.message);
    render();
  }
}

// ── Acciones: Enfoques / Metas / To dos ─────────────────────────────────
function toggleMetaForm(catId) {
  S.metaFormCat = S.metaFormCat === catId ? null : catId;
  render();
  if (S.metaFormCat) setTimeout(() => { const i = document.getElementById("inp-meta-" + catId); if(i) i.focus(); }, 100);
}

async function guardarMeta(catId) {
  const inp = document.getElementById("inp-meta-" + catId);
  const texto = inp ? inp.value.trim() : "";
  if (!texto) return;
  try {
    const guardado = await dbGuardarMeta({ categoria: catId, texto });
    if (guardado) { guardado.todos = []; S.metas.push(guardado); }
    S.metaFormCat = null;
    render();
  } catch(e) { alert("Error al guardar meta: " + e.message); }
}

async function eliminarMeta(id) {
  if (!confirm("¿Eliminar esta meta y sus to dos?")) return;
  try {
    await dbEliminarMeta(id);
    S.metas = S.metas.filter(m=>m.id!==id);
    render();
  } catch(e) { alert("Error: " + e.message); }
}

async function guardarMetaTodo(metaId) {
  const inp = document.getElementById("inp-todo-" + metaId);
  const texto = inp ? inp.value.trim() : "";
  if (!texto) return;
  try {
    const guardado = await dbGuardarMetaTodo({ meta_id: metaId, texto, completado: false });
    const m = S.metas.find(x=>x.id===metaId);
    if (guardado && m) { if (!m.todos) m.todos = []; m.todos.push(guardado); }
    render();
    setTimeout(() => { const i = document.getElementById("inp-todo-" + metaId); if(i) i.focus(); }, 100);
  } catch(e) { alert("Error al guardar to do: " + e.message); }
}

async function toggleMetaTodo(id) {
  let nuevo = null;
  S.metas.forEach(m => { (m.todos||[]).forEach(t => { if (t.id===id) { nuevo = !t.completado; t.completado = nuevo; } }); });
  render();
  try { await dbActualizarMetaTodo(id, {completado:nuevo}); } catch(e) { alert("Error: " + e.message); }
}

async function eliminarMetaTodo(id, metaId) {
  try {
    await dbEliminarMetaTodo(id);
    const m = S.metas.find(x=>x.id===metaId);
    if (m) m.todos = (m.todos||[]).filter(t=>t.id!==id);
    render();
  } catch(e) { alert("Error: " + e.message); }
}

// ── Drag & drop (pointer events: funciona con mouse y touch) ───────────
let dragState = null;

function iniciarDrag(e, id) {
  e.preventDefault();
  const handle = e.currentTarget;
  try { handle.setPointerCapture(e.pointerId); } catch(err) {}
  const row = handle.closest(".task-row");
  if (!row) return;
  const rect = row.getBoundingClientRect();
  const ghost = row.cloneNode(true);
  ghost.style.position = "fixed";
  ghost.style.top = rect.top + "px";
  ghost.style.left = rect.left + "px";
  ghost.style.width = rect.width + "px";
  ghost.style.zIndex = "9999";
  ghost.style.pointerEvents = "none";
  ghost.style.boxShadow = "0 10px 30px rgba(0,0,0,.18)";
  ghost.style.borderRadius = "12px";
  ghost.style.transform = "scale(1.02) rotate(-1deg)";
  document.body.appendChild(ghost);
  row.style.opacity = "0.25";
  dragState = { id, ghost, row, startX:e.clientX, startY:e.clientY, origTop:rect.top, origLeft:rect.left, zoneEl:null };
  document.addEventListener("pointermove", moverDrag);
  document.addEventListener("pointerup", soltarDrag);
}

function moverDrag(e) {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  dragState.ghost.style.top = (dragState.origTop + dy) + "px";
  dragState.ghost.style.left = (dragState.origLeft + dx) + "px";
  dragState.ghost.style.display = "none";
  const el = document.elementFromPoint(e.clientX, e.clientY);
  dragState.ghost.style.display = "";
  document.querySelectorAll("[data-zone]").forEach(z=>z.classList.remove("zone-active"));
  const zoneEl = el ? el.closest("[data-zone]") : null;
  if (zoneEl) zoneEl.classList.add("zone-active");
  dragState.zoneEl = zoneEl;
}

function soltarDrag(e) {
  if (!dragState) return;
  document.removeEventListener("pointermove", moverDrag);
  document.removeEventListener("pointerup", soltarDrag);
  document.querySelectorAll("[data-zone]").forEach(z=>z.classList.remove("zone-active"));
  dragState.ghost.remove();
  if (dragState.row) dragState.row.style.opacity = "1";
  const { id, zoneEl } = dragState;
  dragState = null;
  if (zoneEl) {
    const zona = zoneEl.dataset.zone;
    const dia = zoneEl.dataset.dia || null;
    moverTask(id, zona, dia);
  }
}

// ── Init ────────────────────────────────────────────────────────────────
function iniciarApp() {
  document.getElementById("app").innerHTML = `
    <div style="min-height:100vh;background:#F7F6F3;display:flex;align-items:center;justify-content:center;">
      <p style="font-size:13px;color:#bbb;font-weight:500;letter-spacing:1px;">Cargando...</p>
    </div>`;
  Promise.all([dbCargar(), dbCargarMetas()])
    .then(([tasks, metas]) => { S.tasks = tasks || []; S.metas = metas || []; render(); })
    .catch(e => {
      document.getElementById("app").innerHTML = `
        <div style="min-height:100vh;background:#F7F6F3;display:flex;align-items:center;justify-content:center;padding:24px;">
          <p style="font-size:13px;color:#D94F3D;text-align:center;">Error al conectar:<br>${e.message}</p>
        </div>`;
    });
}

iniciarApp();

</script>
