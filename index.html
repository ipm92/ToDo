function xhr(method, url, body) {
  return new Promise((resolve, reject) => {
    const r = new XMLHttpRequest();
    r.open(method, url, true);
    r.setRequestHeader("Content-Type", "application/json");
    r.setRequestHeader("apikey", SUPABASE_KEY);
    r.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
    r.setRequestHeader("Prefer", "return=representation");
    r.timeout = 12000;
    r.ontimeout = () => reject(new Error("Timeout - sin conexión"));
    r.onerror   = () => reject(new Error("Error de red"));
    r.onload    = () => {
      if (r.status >= 200 && r.status < 300) {
        try { resolve(JSON.parse(r.responseText)); } catch(e) { resolve([]); }
      } else {
        reject(new Error("Error " + r.status + ": " + r.responseText));
      }
    };
    r.send(body ? JSON.stringify(body) : null);
  });
}

function filaEditInput(t) {

function filaMaestra(t, i, total, isDone) {
  if (S.editandoId === t.id) return filaEditInput(t);
  const cat = getCategoria(t.categoria);
  const isFirst = i===0, isLast = i===total-1;
  const rad = isFirst&&isLast ? "12px" : isFirst ? "12px 12px 4px 4px" : isLast ? "4px 4px 12px 12px" : "4px";

    ${S.eliminarId===t.id ? `

        <button onclick="accionEliminar(${t.id})" style="font-size:11px;font-weight:600;color:#D94F3D;background:#D94F3D14;border-radius:6px;padding:4px 9px;">Eliminar</button>

}

function filaSemana(t, i, total, isDone, bg, override) {
  if (S.editandoId === t.id) return filaEditInput(t);
  bg = bg || "#fff";
  const cat = getCategoria(t.categoria);
  const color = override ? override.color : cat.color;
  const label = override ? override.label : cat.label;
  const hideTag = override && override.hideTag;
  const sinClasificar = !hideTag && cat.id === "sin_clasificar";
  const isFirst = i===0, isLast = i===total-1;
  const rad = isFirst&&isLast ? "12px" : isFirst ? "12px 12px 4px 4px" : isLast ? "4px 4px 12px 12px" : "4px";
  return `
  <div class="task-row" data-id="${t.id}" style="background:${bg};border-radius:${rad};padding:13px 14px;display:flex;align-items:center;gap:11px;opacity:${isDone?0.55:1};">
    <button onclick="toggleCompletado(${t.id})" style="width:22px;height:22px;border-radius:50%;border:1.5px solid ${isDone?color:'#E0DDD7'};background:${isDone?color:'#fff'};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;">${isDone?'✓':''}</button>
    <div style="width:3px;min-height:30px;border-radius:2px;flex-shrink:0;background:${color};"></div>
    <div style="flex:1;min-width:0;">

      ${!hideTag ? `
      <div style="display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;">
        <span onclick="${sinClasificar ? `toggleClasificar(${t.id})` : ''}" style="font-size:11px;font-weight:500;color:${color};background:${color}14;padding:2px 8px;border-radius:20px;${sinClasificar?'cursor:pointer;':''}">${esc(label)}${sinClasificar?' ›':''}</span>
        <span onclick="toggleDiaPicker(${t.id})" style="font-size:11px;font-weight:500;color:${t.dia?getDia(t.dia).color:'#bbb'};background:${t.dia?getDia(t.dia).color+'14':'transparent'};border:1px solid ${t.dia?'transparent':'#E8E6E1'};padding:2px 8px;border-radius:20px;cursor:pointer;">${t.dia?diaLabel(t.dia):'Día ›'}</span>
      </div>` : ''}
      ${S.clasificarId===t.id ? `
      <div class="fade" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
        ${CATEGORIAS.map(c=>`
          <button onclick="asignarCategoria(${t.id},'${c.id}')" style="font-size:11px;font-weight:500;color:${c.color};background:${c.color}14;border:1px solid ${c.color}55;border-radius:20px;padding:4px 10px;">${c.label}</button>`).join('')}
      </div>` : ''}
      ${S.diaPickerId===t.id ? `
      <div class="fade" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
        ${DIAS.map(d=>`
          <button onclick="asignarDia(${t.id},'${d.id}')" style="font-size:11px;font-weight:500;color:${t.dia===d.id?'#fff':d.color};background:${t.dia===d.id?d.color:d.color+'14'};border:1px solid ${d.color}55;border-radius:20px;padding:4px 10px;">${d.label}</button>`).join('')}
        ${t.dia?`<button onclick="asignarDia(${t.id},null)" style="font-size:11px;font-weight:500;color:#bbb;background:#F0EDE8;border-radius:20px;padding:4px 10px;">Quitar</button>`:''}
      </div>` : ''}
    </div>
    ${S.eliminarId===t.id ? `
      <div style="display:flex;gap:5px;flex-shrink:0;">
        <button onclick="accionEliminar(${t.id})" style="font-size:11px;font-weight:600;color:#D94F3D;background:#D94F3D14;border-radius:6px;padding:4px 9px;">Eliminar</button>
        <button onclick="S.eliminarId=null;render()" style="font-size:11px;color:#999;background:#F0EDE8;border-radius:6px;padding:4px 9px;">Cancelar</button>
      </div>` : `
      <button onclick="volverAMaestra(${t.id})" title="Volver a Por asignar" style="font-size:15px;color:#ccc;flex-shrink:0;line-height:1;">←</button>
      <button onclick="S.eliminarId=${t.id};render()" style="font-size:16px;color:#ddd;flex-shrink:0;line-height:1;">×</button>
      ${!isDone ? `<div class="drag-handle" onpointerdown="iniciarDrag(event,${t.id})" style="touch-action:none;cursor:grab;color:#ccc;font-size:17px;padding:4px 2px;flex-shrink:0;line-height:1;">≡</div>` : ''}
    `}
  </div>`;
}

function toggleCategoriaInbox(catId) {
  S.maestraAbiertas[catId] = !S.maestraAbiertas[catId];
  render();
}

function renderCategoriaInbox(cat) {
  const pend = S.tasks.filter(t=>t.estado==='maestra' && t.categoria===cat.id);
  const activos = pend.filter(t=>!t.completado);
  const hechos  = pend.filter(t=>t.completado);
  const abierta = !!S.maestraAbiertas[cat.id];
  return `
  <div style="margin-bottom:10px;">
    <button onclick="toggleCategoriaInbox('${cat.id}')" style="width:100%;display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #E8E6E1;border-radius:12px;padding:14px 16px;">
      <span style="font-size:14px;font-weight:700;color:${cat.color};letter-spacing:.3px;text-transform:uppercase;">${cat.label}</span>
      <span style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;font-weight:600;color:#bbb;">${activos.length}</span>
        <span style="font-size:14px;color:#ccc;display:inline-block;transform:rotate(${abierta?90:0}deg);transition:transform .15s;">›</span>
      </span>
    </button>
    ${abierta ? `
    <div class="fade" data-zone="categoria" data-cat="${cat.id}" style="margin-top:6px;display:flex;flex-direction:column;gap:1px;">
      ${activos.length===0 ? emptyZoneHTML('Sin pendientes en ' + cat.label) : activos.map((t,i)=>filaMaestra(t,i,activos.length,false)).join('')}
    </div>
    ${hechos.length>0 ? `
    <div style="margin-top:6px;display:flex;flex-direction:column;gap:1px;">
      ${hechos.map((t,i)=>filaMaestra(t,i,hechos.length,true)).join('')}
    </div>` : ''}` : ''}
  </div>`;
}

function renderMaestra() {
  return `
  <div style="margin-top:24px;">
    ${CATEGORIAS.map(cat=>renderCategoriaInbox(cat)).join('')}
  </div>`;
}

function catOrdenIndex(catId) {
  if (!catId || catId === "sin_clasificar") return 999;
  const i = CATEGORIAS.findIndex(c=>c.id===catId);
  return i === -1 ? 999 : i;
}

function ordenarPorCategoria(lista) {
  return lista.slice().sort((a,b) => {
    const ca = catOrdenIndex(a.categoria), cb = catOrdenIndex(b.categoria);
    if (ca !== cb) return ca - cb;
    return (a.orden ?? 0) - (b.orden ?? 0);
  });
}

function renderGrupoDia(diaId, items) {
  const d = diaId === "sin" ? null : getDia(diaId);
  const activos = ordenarPorCategoria(items.filter(t=>!t.completado));
  return `
  <div style="margin-bottom:14px;">
    <p style="font-size:11px;font-weight:600;color:${d?d.color:'#bbb'};letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;">${d?d.label:'Sin día'}</p>
    <div data-zone="bandeja" data-dia="${diaId}" style="display:flex;flex-direction:column;gap:1px;min-height:40px;">
      ${activos.length===0 ? emptyZoneHTML('Sin pendientes aquí') : activos.map((t,i)=>filaSemana(t,i,activos.length,false)).join('')}
    </div>
  </div>`;
}

function renderPorAsignar() {
  const items = S.tasks.filter(t=>t.estado==='semana' && !t.meta_id);
  const activos = items.filter(t=>!t.completado);
  const hechos  = items.filter(t=>t.completado);
  const grupos = DIAS.map(d=>({ id:d.id, items: activos.filter(t=>t.dia===d.id) })).filter(g=>g.items.length>0);
  const sinDia = activos.filter(t=>!t.dia);
  return `
  <div style="margin-top:30px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <p style="${LBL}margin-bottom:0;">Por asignar</p>
      ${hechos.length>0 ? `<button onclick="borrarCompletadosSemana()" style="font-size:12px;font-weight:600;color:#D94F3D;background:#D94F3D14;border-radius:20px;padding:5px 12px;">Borrar ${hechos.length} completado${hechos.length!==1?'s':''}</button>` : ''}
    </div>
    <div style="display:flex;gap:6px;margin-bottom:14px;">
      <input id="quick-add-semana" type="text" placeholder="Captura rápida, clasifica después..."
        style="flex:1;background:#fff;border:1.5px solid #E8E6E1;border-radius:10px;padding:10px 14px;font-size:14px;color:#1a1a1a;"
        onkeydown="if(event.key==='Enter') quickAddSemana()" />
      <button onclick="quickAddSemana()" style="font-size:14px;font-weight:600;color:#fff;background:#1a1a1a;border-radius:10px;padding:10px 16px;flex-shrink:0;">+</button>
    </div>
    ${grupos.map(g=>renderGrupoDia(g.id, g.items)).join('')}
    ${renderGrupoDia("sin", sinDia)}
    ${hechos.length>0 ? `
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:1px;">
      ${hechos.map((t,i)=>filaSemana(t,i,hechos.length,true)).join('')}
    </div>` : ''}
  </div>`;
}

function renderMetaForm() {
  return `

// ── Acciones ────────────────────────────────────────────────────────────
function toggleForm(destino) {
  destino = destino || "maestra";
  if (S.mostrarForm && S.formDestino === destino) {
    S.mostrarForm = false;
  } else {
    S.mostrarForm = true;
    S.formDestino = destino;
    S.form = formVacio();
  }
  render();
  if (S.mostrarForm) setTimeout(() => { const i = document.getElementById("f-texto"); if(i) i.focus(); }, 150);
}

function actualizarBtnForm() {
  const btn = document.getElementById("btn-agregar");
  if (!btn) return;
  const ok = S.form.texto.trim().length > 0;
  btn.style.background = ok ? "#1a1a1a" : "#E8E6E1";
  btn.style.color = ok ? "#fff" : "#aaa";
}

async function accionGuardar() {
  const texto = (S.form.texto || "").trim();
  if (!texto) { alert("Escribe el pendiente"); return; }
  const btn = document.getElementById("btn-agregar");
  if (btn) { btn.innerText = "Guardando..."; btn.style.opacity = ".6"; btn.disabled = true; }
  const destino = S.formDestino === "semana" ? "semana" : "maestra";
  const obj = { texto, categoria: S.form.categoria, estado: destino, dia: null, meta_id: null, completado: false };
  try {
    const guardado = await dbGuardar(obj);
    if (guardado) S.tasks.push(guardado);
    S.form = formVacio();
    S.mostrarForm = false;
    render();
  } catch(e) {
    alert("Error al guardar: " + e.message);
    if (btn) { btn.innerText = "Agregar"; btn.style.opacity = "1"; btn.disabled = false; }
  }
}

async function quickAddSemana() {
  const inp = document.getElementById("quick-add-semana");
  const texto = inp ? inp.value.trim() : "";
  if (!texto) return;
  const obj = { texto, categoria:"sin_clasificar", estado:"semana", dia:null, meta_id:null, completado:false };
  try {
    const guardado = await dbGuardar(obj);
    if (guardado) S.tasks.push(guardado);
    render();
    setTimeout(() => { const i = document.getElementById("quick-add-semana"); if(i) i.focus(); }, 100);
  } catch(e) { alert("Error al guardar: " + e.message); }
}

async function recalcMeta(metaId) {
  if (!metaId) return;
  const todos = S.tasks.filter(t=>t.meta_id===metaId);
  const listo = todos.length>0 && todos.every(t=>t.completado);
  const m = S.metas.find(x=>x.id===metaId);
  if (!m || !!m.completado === listo) return;
  S.metas = S.metas.map(x=>x.id===metaId?{...x, completado:listo}:x);
  render();
  try { await dbActualizarMeta(metaId, {completado:listo}); } catch(e) { /* silencioso */ }
}

async function toggleMetaCompletado(id) {
  const m = S.metas.find(x=>x.id===id);
  if (!m) return;
  const nuevo = !m.completado;
  S.metas = S.metas.map(x=>x.id===id?{...x,completado:nuevo}:x);
  render();
  try { await dbActualizarMeta(id, {completado:nuevo}); } catch(e) { alert("Error: " + e.message); }
}

async function toggleCompletado(id) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  const nuevo = !t.completado;
  S.tasks = S.tasks.map(x=>x.id===id?{...x,completado:nuevo}:x);
  render();
  try { await dbActualizar(id, {completado:nuevo}); } catch(e) { alert("Error: " + e.message); }
  if (t.meta_id) recalcMeta(t.meta_id);
}

async function accionEliminar(id) {
  const t = S.tasks.find(x=>x.id===id);
  const metaIdAnterior = t ? t.meta_id : null;
  try {
    await dbEliminar(id);
    S.tasks = S.tasks.filter(t=>t.id!==id);
    S.eliminarId = null;
    render();
    if (metaIdAnterior) recalcMeta(metaIdAnterior);
  } catch(e) { alert("Error al eliminar: " + e.message); }
}

async function borrarCompletadosSemana() {
  const completados = S.tasks.filter(t=>t.estado==='semana' && !t.meta_id && t.completado);
  if (completados.length===0) return;
  if (!confirm(`¿Eliminar ${completados.length} pendiente${completados.length!==1?'s':''} completado${completados.length!==1?'s':''}?`)) return;
  try {
    await Promise.all(completados.map(t=>dbEliminar(t.id)));
    const ids = new Set(completados.map(t=>t.id));
    S.tasks = S.tasks.filter(t=>!ids.has(t.id));
    render();
  } catch(e) { alert("Error al eliminar: " + e.message); }
}

async function enviarASemana(id) {
  const obj = { estado:"semana", dia:null, meta_id:null };
  S.tasks = S.tasks.map(x=>x.id===id?{...x,...obj}:x);
  render();
  try { await dbActualizar(id, obj); } catch(e) { alert("Error: " + e.message); }
}

async function volverAMaestra(id) {
  const t = S.tasks.find(x=>x.id===id);
  const metaIdAnterior = t ? t.meta_id : null;
  const obj = { estado:"maestra", dia:null, meta_id:null };
  S.tasks = S.tasks.map(x=>x.id===id?{...x,...obj}:x);
  render();
  try { await dbActualizar(id, obj); } catch(e) { alert("Error: " + e.message); }
  if (metaIdAnterior) recalcMeta(metaIdAnterior);
}

async function moverTask(id, zona, extra) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  const metaIdAnterior = t.meta_id || null;
  let obj;
  if (zona === "bandeja") obj = { estado:"semana", meta_id:null, dia: extra==="sin" ? null : extra };
  else if (zona === "meta") obj = { estado:"semana", meta_id:Number(extra) };
  else return;
  if (t.estado===obj.estado && (t.meta_id||null)===(obj.meta_id||null) && (zona!=="bandeja" || (t.dia||null)===(obj.dia||null))) return;
  S.tasks = S.tasks.map(x=>x.id===id?{...x,...obj}:x);
  render();
  try { await dbActualizar(id, obj); } catch(e) { alert("Error al mover: " + e.message); }
  if (metaIdAnterior) recalcMeta(metaIdAnterior);
  if (obj.meta_id) recalcMeta(obj.meta_id);
}

// ── Reordenar dentro de una misma zona (bandeja, categoría o meta) ──────
function idsEnZona(zona, extra) {
  if (zona === "bandeja") {
    const diaFiltro = extra==="sin" ? null : extra;
    return ordenarPorCategoria(S.tasks.filter(t=>t.estado==='semana' && !t.meta_id && !t.completado && (t.dia||null)===diaFiltro)).map(t=>t.id);
  }
  if (zona === "meta") return S.tasks.filter(t=>t.meta_id===Number(extra) && !t.completado).map(t=>t.id);
  if (zona === "categoria") return S.tasks.filter(t=>t.estado==='maestra' && t.categoria===extra && !t.completado).map(t=>t.id);
  return [];
}

async function reordenarZona(zona, extra, draggedId, overRowId, overBefore) {
  let ids = idsEnZona(zona, extra).filter(id => id !== draggedId);
  let index;
  if (overRowId == null) {
    index = ids.length;
  } else {
    const i = ids.indexOf(Number(overRowId));
    index = i === -1 ? ids.length : (overBefore ? i : i + 1);
  }
  ids.splice(index, 0, draggedId);
  const updates = ids.map((tid, i) => ({ id: tid, orden: i }));
  S.tasks = S.tasks.map(t => {
    const u = updates.find(x=>x.id===t.id);
    return u ? { ...t, orden: u.orden } : t;
  });
  render();
  try { await Promise.all(updates.map(u => dbActualizar(u.id, { orden: u.orden }))); } catch(e) { /* silencioso */ }
}

async function manejarSoltar(id, zona, extra, overRowId, overBefore) {
  if (zona !== "categoria") await moverTask(id, zona, extra);
  await reordenarZona(zona, extra, id, overRowId, overBefore);
}

async function ejecutarPlanearSemana(destino) {
  const semana = S.tasks.filter(t=>t.estado==='semana');
  const aEliminar = semana.filter(t=>t.completado);
  const incompletos = semana.filter(t=>!t.completado);
  S.confirmSemana = false;
  render();
  try {
    await Promise.all(aEliminar.map(t=>dbEliminar(t.id)));
    const eliminarIds = new Set(aEliminar.map(t=>t.id));
    let tasksNuevas = S.tasks.filter(t=>!eliminarIds.has(t.id));

    // Borrar siempre todas las metas y sus acciones quedan sin meta_id (on delete set null)
    await Promise.all(S.metas.map(m=>dbEliminarMeta(m.id)));

    const incompletosIds = new Set(incompletos.map(t=>t.id));
    if (destino === "maestra") {
      await Promise.all(incompletos.map(t=>dbActualizar(t.id, {estado:"maestra", dia:null, meta_id:null})));
      tasksNuevas = tasksNuevas.map(t=> incompletosIds.has(t.id) ? {...t, estado:"maestra", dia:null, meta_id:null} : (t.meta_id ? {...t, meta_id:null} : t));
    } else {
      await Promise.all(incompletos.map(t=>dbActualizar(t.id, {dia:null, meta_id:null})));
      tasksNuevas = tasksNuevas.map(t=> incompletosIds.has(t.id) ? {...t, dia:null, meta_id:null} : (t.meta_id ? {...t, meta_id:null} : t));
    }

    S.tasks = tasksNuevas;
    S.metas = [];
    render();
  } catch(e) {
    alert("Error: " + e.message);
    render();
  }
}

async function convertirEnMeta(id) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  const metaIdAnterior = t.meta_id || null;
  try {
    const nuevaMeta = await dbGuardarMeta({ texto: t.texto, completado: false });
    await dbEliminar(id);
    if (nuevaMeta) S.metas.push(nuevaMeta);
    S.tasks = S.tasks.filter(x=>x.id!==id);
    render();
    if (metaIdAnterior) recalcMeta(metaIdAnterior);
  } catch(e) { alert("Error al convertir en meta: " + e.message); }
}

let dragState = null;

function iniciarDrag(e, id) {
  e.preventDefault();
  const handle = e.currentTarget;
  try { handle.setPointerCapture(e.pointerId); } catch(err) {}
  const row = handle.closest(".task-row");
  if (!row) return;
  const rect = row.getBoundingClientRect();
  const ghost = row.cloneNode(true);
  ghost.style.position = "fixed";
  ghost.style.top = rect.top + "px";
  ghost.style.left = rect.left + "px";
  ghost.style.width = rect.width + "px";
  ghost.style.zIndex = "9999";
  ghost.style.pointerEvents = "none";
  ghost.style.boxShadow = "0 10px 30px rgba(0,0,0,.18)";
  ghost.style.borderRadius = "12px";
  ghost.style.transform = "scale(1.02) rotate(-1deg)";
  document.body.appendChild(ghost);
  row.style.opacity = "0.25";
  dragState = { id, ghost, row, startX:e.clientX, startY:e.clientY, origTop:rect.top, origLeft:rect.left, zoneEl:null, overRowId:null, overBefore:null };
  document.addEventListener("pointermove", moverDrag);
  document.addEventListener("pointerup", soltarDrag);
}

function moverDrag(e) {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  dragState.ghost.style.top = (dragState.origTop + dy) + "px";
  dragState.ghost.style.left = (dragState.origLeft + dx) + "px";
  dragState.ghost.style.display = "none";
  const el = document.elementFromPoint(e.clientX, e.clientY);
  dragState.ghost.style.display = "";
  document.querySelectorAll("[data-zone]").forEach(z=>z.classList.remove("zone-active"));
  const zoneEl = el ? el.closest("[data-zone]") : null;
  if (zoneEl) zoneEl.classList.add("zone-active");
  dragState.zoneEl = zoneEl;

  const rowEl = el ? el.closest(".task-row") : null;
  if (rowEl && rowEl.dataset.id && Number(rowEl.dataset.id) !== dragState.id) {
    const rowRect = rowEl.getBoundingClientRect();
    dragState.overRowId = rowEl.dataset.id;
    dragState.overBefore = (e.clientY - rowRect.top) < (rowRect.height / 2);
  } else {
    dragState.overRowId = null;
    dragState.overBefore = null;
  }
}

function soltarDrag(e) {
  if (!dragState) return;
  document.removeEventListener("pointermove", moverDrag);
  document.removeEventListener("pointerup", soltarDrag);
  document.querySelectorAll("[data-zone]").forEach(z=>z.classList.remove("zone-active"));
  dragState.ghost.remove();
  if (dragState.row) dragState.row.style.opacity = "1";
  const { id, zoneEl, overRowId, overBefore } = dragState;
  dragState = null;
  if (zoneEl) {
    const zona = zoneEl.dataset.zone;
    if (zona === "meta") manejarSoltar(id, "meta", zoneEl.dataset.meta, overRowId, overBefore);
    else if (zona === "bandeja") manejarSoltar(id, "bandeja", zoneEl.dataset.dia, overRowId, overBefore);
    else if (zona === "categoria") manejarSoltar(id, "categoria", zoneEl.dataset.cat, overRowId, overBefore);
    else if (zona === "nueva-meta") convertirEnMeta(id);
  }
}

function iniciarApp() {

    .then(([tasks, metas, enfoques]) => { S.tasks = tasks || []; S.metas = metas || []; S.enfoques = enfoques || []; render(); })
    .catch(e => {
      document.getElementById("app").innerHTML = `
        <div style="min-height:100vh;background:#F7F6F3;display:flex;align-items:center;justify-content:center;padding:24px;">
          <p style="font-size:13px;color:#D94F3D;text-align:center;">Error al conectar:<br>${e.message}</p>
        </div>`;
    });
}

// ── Auto-actualización: evita que quede pegada una versión vieja en caché ──
function revisarVersionNueva() {
  try {
    fetch(location.pathname + "?_chk=" + Date.now(), { cache: "no-store" })
      .then(r => r.text())
      .then(html => {
        const m = html.match(/APP_VERSION\s*=\s*"([^"]+)"/);
        if (m && m[1] && m[1] !== APP_VERSION) {
          location.href = location.pathname + "?v=" + Date.now();
        }
      })
      .catch(() => {});
  } catch(e) {}
}

revisarVersionNueva();
iniciarApp();
