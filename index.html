<script>

const API_METAS = SUPABASE_URL + "/rest/v1/metas";

function xhr(method, url, body) {
  return new Promise((resolve, reject) => {
    const r = new XMLHttpRequest();
    r.open(method, url, true);
    r.setRequestHeader("Content-Type", "application/json");
    r.setRequestHeader("apikey", SUPABASE_KEY);
    r.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
    r.setRequestHeader("Prefer", "return=representation");
    r.timeout = 12000;
    r.ontimeout = () => reject(new Error("Timeout - sin conexión"));
    r.onerror   = () => reject(new Error("Error de red"));
    r.onload    = () => {
      if (r.status >= 200 && r.status < 300) {
        try { resolve(JSON.parse(r.responseText)); } catch(e) { resolve([]); }
      } else {
        reject(new Error("Error " + r.status + ": " + r.responseText));
      }
    };
    r.send(body ? JSON.stringify(body) : null);
  });
}
async function dbCargar() {
  return await xhr("GET", API + "?order=created_at.asc&apikey=" + SUPABASE_KEY);
}
async function dbGuardar(obj) {
  const res = await xhr("POST", API + "?apikey=" + SUPABASE_KEY, obj);
  return Array.isArray(res) ? res[0] : res;
}
async function dbActualizar(id, obj) {
  const res = await xhr("PATCH", API + "?id=eq." + id + "&apikey=" + SUPABASE_KEY, obj);
  return Array.isArray(res) ? res[0] : res;
}
async function dbEliminar(id) {
  await xhr("DELETE", API + "?id=eq." + id + "&apikey=" + SUPABASE_KEY);
}
async function dbCargarMetas() {

  return Array.isArray(res) ? res[0] : res;
}
async function dbEliminarMeta(id) {

async function dbActualizarMeta(id, obj) {

// ── Datos ──────────────────────────────────────────────────────────────
const CATEGORIAS = [
  { id:"release",    label:"Release",   color:"#EF6C04" },
  { id:"cardolan",   label:"Cardolán",  color:"#0A8043" },
  { id:"social",     label:"Social",    color:"#7BB443" },
  { id:"gestion",    label:"Gestión",   color:"#BFC932" },
  { id:"matrimonio", label:"Matrimonio",color:"#8E24AA" },
];
const DIAS = [
  { id:"lunes",     label:"Lunes" },
  { id:"martes",    label:"Martes" },
  { id:"miercoles", label:"Miércoles" },
  { id:"jueves",    label:"Jueves" },
  { id:"viernes",   label:"Viernes" },
];

function getCategoria(id) { return CATEGORIAS.find(c=>c.id===id) || CATEGORIAS[0]; }
function diaLabel(id) { const d = DIAS.find(x=>x.id===id); return d ? d.label : ""; }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function formVacio() { return { texto:"", categoria:"release" }; }

// ── Estado ─────────────────────────────────────────────────────────────
const S = {
  tab: "semana",
  tasks: [],
  metas: [],
  metaFormCat: null,
  maestraAbiertas: {},
  mostrarForm: false,
  form: formVacio(),
  eliminarId: null,
  editandoId: null,
  editandoMetaId: null,
  confirmSemana: false,
  opcionPasarMaestra: true,
  opcionBorrarMetas: false,
};

const LBL = `font-size:11px;font-weight:500;color:#999;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:block;`;
const INP = `width:100%;background:#fff;border:1.5px solid #E8E6E1;border-radius:10px;padding:11px 14px;color:#1a1a1a;font-size:15px;transition:border-color .15s;`;

// ── Render: piezas compartidas ──────────────────────────────────────────
function emptyZoneHTML(msg) {
  return `<div style="background:#fff;border:1.5px dashed #E8E6E1;border-radius:12px;padding:18px;text-align:center;"><p style="font-size:12px;color:#ccc;">${msg}</p></div>`;
}

function filaEditInput(t) {
  return `
  <div style="background:#fff;border:1.5px solid #1a1a1a;border-radius:12px;padding:10px 12px;display:flex;gap:8px;align-items:center;">
    <input id="edit-texto-${t.id}" type="text" value="${esc(t.texto)}"
      style="flex:1;background:#F7F6F3;border:1.5px solid #E8E6E1;border-radius:8px;padding:9px 12px;font-size:14px;color:#1a1a1a;"
      onkeydown="if(event.key==='Enter') guardarEdicionTexto(${t.id}); if(event.key==='Escape') cancelarEdicionTexto();" />
    <button onclick="guardarEdicionTexto(${t.id})" style="font-size:13px;font-weight:600;color:#fff;background:#1a1a1a;border-radius:8px;padding:9px 12px;flex-shrink:0;">✓</button>
    <button onclick="cancelarEdicionTexto()" style="font-size:15px;color:#999;background:#F0EDE8;border-radius:8px;padding:9px 12px;flex-shrink:0;line-height:1;">×</button>
  </div>`;
}

function filaMaestra(t, i, total, isDone) {
  if (S.editandoId === t.id) return filaEditInput(t);
  const cat = getCategoria(t.categoria);
  const isFirst = i===0, isLast = i===total-1;
  const rad = isFirst&&isLast ? "12px" : isFirst ? "12px 12px 4px 4px" : isLast ? "4px 4px 12px 12px" : "4px";
  return `
  <div style="background:#fff;border-radius:${rad};padding:13px 14px;display:flex;align-items:center;gap:11px;opacity:${isDone?0.55:1};">
    <button onclick="toggleCompletado(${t.id})" style="width:22px;height:22px;border-radius:50%;border:1.5px solid ${isDone?cat.color:'#E0DDD7'};background:${isDone?cat.color:'#fff'};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;">${isDone?'✓':''}</button>
    <div style="width:3px;min-height:30px;border-radius:2px;flex-shrink:0;background:${cat.color};"></div>
    <div style="flex:1;min-width:0;" onclick="editarTexto(${t.id})">
      <p style="font-size:14.5px;font-weight:600;color:${isDone?'#aaa':'#1a1a1a'};${isDone?'text-decoration:line-through;':''}overflow:hidden;text-overflow:ellipsis;cursor:pointer;">${esc(t.texto)}</p>
      <span style="font-size:11px;font-weight:500;color:${cat.color};background:${cat.color}14;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px;">${cat.label}</span>
    </div>
    ${S.eliminarId===t.id ? `
      <div style="display:flex;gap:5px;flex-shrink:0;">
        <button onclick="accionEliminar(${t.id})" style="font-size:11px;font-weight:600;color:#D94F3D;background:#D94F3D14;border-radius:6px;padding:4px 9px;">Eliminar</button>
        <button onclick="S.eliminarId=null;render()" style="font-size:11px;color:#999;background:#F0EDE8;border-radius:6px;padding:4px 9px;">Cancelar</button>
      </div>` : `
      <button onclick="S.eliminarId=${t.id};render()" style="font-size:16px;color:#ddd;flex-shrink:0;line-height:1;">×</button>
      ${!isDone ? `<button onclick="enviarASemana(${t.id})" style="font-size:11px;font-weight:600;color:#777;background:#F0EDE8;border-radius:8px;padding:7px 10px;flex-shrink:0;white-space:nowrap;">→ Semana</button>` : ''}
    `}
  </div>`;
}

function filaSemana(t, i, total, isDone, bg) {
  if (S.editandoId === t.id) return filaEditInput(t);
  bg = bg || "#fff";
  const cat = getCategoria(t.categoria);
  const isFirst = i===0, isLast = i===total-1;
  const rad = isFirst&&isLast ? "12px" : isFirst ? "12px 12px 4px 4px" : isLast ? "4px 4px 12px 12px" : "4px";
  return `
  <div class="task-row" data-id="${t.id}" style="background:${bg};border-radius:${rad};padding:13px 14px;display:flex;align-items:center;gap:11px;opacity:${isDone?0.55:1};">
    <button onclick="toggleCompletado(${t.id})" style="width:22px;height:22px;border-radius:50%;border:1.5px solid ${isDone?cat.color:'#E0DDD7'};background:${isDone?cat.color:'#fff'};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;">${isDone?'✓':''}</button>
    <div style="width:3px;min-height:30px;border-radius:2px;flex-shrink:0;background:${cat.color};"></div>
    <div style="flex:1;min-width:0;" onclick="editarTexto(${t.id})">
      <p style="font-size:14.5px;font-weight:600;color:${isDone?'#aaa':'#1a1a1a'};${isDone?'text-decoration:line-through;':''}overflow:hidden;text-overflow:ellipsis;cursor:pointer;">${esc(t.texto)}</p>
      <div style="display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;">
        <span style="font-size:11px;font-weight:500;color:${cat.color};background:${cat.color}14;padding:2px 8px;border-radius:20px;">${cat.label}</span>
        ${t.dia?`<span style="font-size:11px;color:#bbb;">${diaLabel(t.dia)}</span>`:''}
      </div>
    </div>
    ${S.eliminarId===t.id ? `
      <div style="display:flex;gap:5px;flex-shrink:0;">
        <button onclick="accionEliminar(${t.id})" style="font-size:11px;font-weight:600;color:#D94F3D;background:#D94F3D14;border-radius:6px;padding:4px 9px;">Eliminar</button>
        <button onclick="S.eliminarId=null;render()" style="font-size:11px;color:#999;background:#F0EDE8;border-radius:6px;padding:4px 9px;">Cancelar</button>
      </div>` : `
      <button onclick="volverAMaestra(${t.id})" title="Volver al Inbox" style="font-size:15px;color:#ccc;flex-shrink:0;line-height:1;">←</button>
      <button onclick="S.eliminarId=${t.id};render()" style="font-size:16px;color:#ddd;flex-shrink:0;line-height:1;">×</button>
      ${!isDone ? `<div class="drag-handle" onpointerdown="iniciarDrag(event,${t.id})" style="touch-action:none;cursor:grab;color:#ccc;font-size:17px;padding:4px 2px;flex-shrink:0;line-height:1;">≡</div>` : ''}
    `}
  </div>`;
}

function toggleCategoriaInbox(catId) {
  S.maestraAbiertas[catId] = !S.maestraAbiertas[catId];
  render();
}

function renderCategoriaInbox(cat) {
  const pend = S.tasks.filter(t=>t.estado==='maestra' && t.categoria===cat.id);
  const activos = pend.filter(t=>!t.completado);
  const hechos  = pend.filter(t=>t.completado);
  const abierta = !!S.maestraAbiertas[cat.id];
  return `
  <div style="margin-bottom:10px;">
    <button onclick="toggleCategoriaInbox('${cat.id}')" style="width:100%;display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #E8E6E1;border-radius:12px;padding:14px 16px;">
      <span style="font-size:14px;font-weight:700;color:${cat.color};letter-spacing:.3px;text-transform:uppercase;">${cat.label}</span>
      <span style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;font-weight:600;color:#bbb;">${activos.length}</span>
        <span style="font-size:14px;color:#ccc;display:inline-block;transform:rotate(${abierta?90:0}deg);transition:transform .15s;">›</span>
      </span>
    </button>
    ${abierta ? `
    <div class="fade" style="margin-top:6px;display:flex;flex-direction:column;gap:1px;">
      ${activos.length===0 ? emptyZoneHTML('Sin pendientes en ' + cat.label) : activos.map((t,i)=>filaMaestra(t,i,activos.length,false)).join('')}
    </div>
    ${hechos.length>0 ? `
    <div style="margin-top:6px;display:flex;flex-direction:column;gap:1px;">
      ${hechos.map((t,i)=>filaMaestra(t,i,hechos.length,true)).join('')}
    </div>` : ''}` : ''}
  </div>`;
}

function renderMaestra() {
  return `
  <div style="margin-top:24px;">
    ${CATEGORIAS.map(cat=>renderCategoriaInbox(cat)).join('')}
  </div>`;
}

function renderTodosSemana() {
  const items = S.tasks.filter(t=>t.estado==='semana' && !t.dia && !t.meta_id);
  const activos = items.filter(t=>!t.completado);
  const hechos  = items.filter(t=>t.completado);
  return `
  <div style="margin-top:30px;">
    <p style="${LBL}">To dos de la semana · ${activos.length}</p>
    <div data-zone="bandeja" style="display:flex;flex-direction:column;gap:1px;min-height:50px;">
      ${activos.length===0 ? emptyZoneHTML('Usa "→ Semana" desde el Inbox para traer pendientes aquí') : activos.map((t,i)=>filaSemana(t,i,activos.length,false)).join('')}
    </div>
    ${hechos.length>0 ? `
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:1px;">
      ${hechos.map((t,i)=>filaSemana(t,i,hechos.length,true)).join('')}
    </div>` : ''}
  </div>`;
}

function renderMetaForm(cat) {
  return `
  <div class="fade" style="background:#fff;border:1px solid #E8E6E1;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;gap:8px;">
    <input id="inp-meta-${cat.id}" type="text" placeholder="Nueva meta de ${cat.label}"
      style="flex:1;background:#F7F6F3;border:1.5px solid #E8E6E1;border-radius:8px;padding:9px 12px;font-size:13.5px;color:#1a1a1a;"
      onkeydown="if(event.key==='Enter') guardarMeta('${cat.id}')" />
    <button onclick="guardarMeta('${cat.id}')" style="font-size:13px;font-weight:600;color:#fff;background:#1a1a1a;border-radius:8px;padding:9px 14px;flex-shrink:0;">Listo</button>
  </div>`;
}

function renderMeta(m, cat) {
  const todos = S.tasks.filter(t=>t.meta_id===m.id);
  const total = todos.length;
  const hechos = todos.filter(t=>t.completado).length;
  const completa = !!m.completado;
  if (S.editandoMetaId === m.id) {
    return `
    <div style="background:#fff;border:1.5px solid #1a1a1a;border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;gap:8px;align-items:center;">
      <input id="edit-meta-${m.id}" type="text" value="${esc(m.texto)}"
        style="flex:1;background:#F7F6F3;border:1.5px solid #E8E6E1;border-radius:8px;padding:9px 12px;font-size:14px;color:#1a1a1a;"
        onkeydown="if(event.key==='Enter') guardarEdicionMeta(${m.id}); if(event.key==='Escape') cancelarEdicionMeta();" />
      <button onclick="guardarEdicionMeta(${m.id})" style="font-size:13px;font-weight:600;color:#fff;background:#1a1a1a;border-radius:8px;padding:9px 12px;flex-shrink:0;">✓</button>
      <button onclick="cancelarEdicionMeta()" style="font-size:15px;color:#999;background:#F0EDE8;border-radius:8px;padding:9px 12px;flex-shrink:0;line-height:1;">×</button>
    </div>`;
  }
  return `
  <div data-zone="meta" data-meta="${m.id}" style="background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;border:1px solid #E8E6E1;">
    <div style="display:flex;align-items:flex-start;gap:10px;">
      <button onclick="toggleMetaCompletado(${m.id})" style="width:20px;height:20px;border-radius:6px;border:1.5px solid ${completa?cat.color:'#E0DDD7'};background:${completa?cat.color:'#fff'};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;margin-top:1px;">${completa?'✓':''}</button>
      <div style="flex:1;min-width:0;" onclick="editarMeta(${m.id})">
        <p style="font-size:14.5px;font-weight:600;color:${completa?'#aaa':'#1a1a1a'};${completa?'text-decoration:line-through;':''}cursor:pointer;">${esc(m.texto)}</p>
        ${total>0?`<p style="font-size:11px;color:#bbb;margin-top:2px;">${hechos}/${total} listo${total===1?'':'s'}</p>`:''}
      </div>
      <button onclick="eliminarMeta(${m.id})" style="font-size:15px;color:#ddd;flex-shrink:0;line-height:1;">×</button>
    </div>
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:1px;padding-left:30px;">
      ${total===0 ? `<p style="font-size:12px;color:#ccc;padding:4px 0 8px;">Arrastra to dos aquí, o agrega uno nuevo</p>` : todos.map((t,i)=>filaSemana(t,i,total,t.completado,'#F7F6F3')).join('')}
      <div style="display:flex;gap:6px;margin-top:8px;">
        <input id="inp-todo-${m.id}" type="text" placeholder="Agregar to do..."
          style="flex:1;background:#F7F6F3;border:1.5px solid #E8E6E1;border-radius:8px;padding:7px 10px;font-size:13px;color:#1a1a1a;"
          onkeydown="if(event.key==='Enter') guardarMetaTodo(${m.id})" />
        <button onclick="guardarMetaTodo(${m.id})" style="font-size:13px;font-weight:600;color:#777;background:#F0EDE8;border-radius:8px;padding:7px 12px;flex-shrink:0;">+</button>
      </div>
    </div>
  </div>`;
}

function renderEnfoque(cat) {
  const metas = S.metas.filter(m=>m.categoria===cat.id);
  return `
  <div style="margin-bottom:22px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <span style="font-size:13px;font-weight:700;color:${cat.color};letter-spacing:.3px;text-transform:uppercase;">${cat.label}</span>
      <button onclick="toggleMetaForm('${cat.id}')" style="font-size:12px;font-weight:600;color:#777;background:#fff;border:1.5px solid #E8E6E1;border-radius:20px;padding:5px 12px;">+ Meta</button>
    </div>
    ${S.metaFormCat===cat.id ? renderMetaForm(cat) : ''}
    <div data-zone="nueva-meta" data-categoria="${cat.id}" style="border:1.5px dashed #E8E6E1;border-radius:12px;padding:9px;margin-bottom:8px;text-align:center;">
      <p style="font-size:11px;color:#ccc;">Suelta aquí un to do para convertirlo en meta</p>
    </div>
    ${metas.length===0 ? `<p style="font-size:12px;color:#ccc;padding:2px 0 0;">Sin metas todavía</p>` : metas.map(m=>renderMeta(m,cat)).join('')}
  </div>`;
}

function renderEnfoques() {
  return `
  <div style="margin-top:30px;">
    <p style="${LBL}">Enfoques de la semana</p>
    ${CATEGORIAS.map(cat=>renderEnfoque(cat)).join('')}
  </div>`;
}

function renderDia(d) {
  const tareas  = S.tasks.filter(t=>t.estado==='semana' && t.dia===d.id);
  const activos = tareas.filter(t=>!t.completado);
  const hechos  = tareas.filter(t=>t.completado);
  return `
  <div style="margin-bottom:16px;">
    <p style="font-size:12px;font-weight:600;color:#999;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;">${d.label}</p>
    <div data-zone="dia" data-dia="${d.id}" style="display:flex;flex-direction:column;gap:1px;min-height:46px;">
      ${activos.length===0 && hechos.length===0 ? emptyZoneHTML('Sin pendientes') : ''}
      ${activos.map((t,i)=>filaSemana(t,i,activos.length,false)).join('')}
      ${hechos.map((t,i)=>filaSemana(t,i,hechos.length,true)).join('')}
    </div>
  </div>`;
}

function renderRecordatorios() {
  return `
  <div style="margin-top:30px;">
    <p style="${LBL}">Recordatorios</p>

          <button onclick="S.tab='maestra';render()" style="padding:7px 18px;border-radius:20px;font-size:13px;font-weight:500;background:${S.tab==='maestra'?'#1a1a1a':'transparent'};color:${S.tab==='maestra'?'#fff':'#999'};border:1.5px solid ${S.tab==='maestra'?'#1a1a1a':'#E8E6E1'};">Inbox</button>

// ── Acciones ────────────────────────────────────────────────────────────
function toggleForm() {
  S.mostrarForm = !S.mostrarForm;
  if (S.mostrarForm) S.form = formVacio();
  render();
  if (S.mostrarForm) setTimeout(() => { const i = document.getElementById("f-texto"); if(i) i.focus(); }, 150);
}

function actualizarBtnForm() {
  const btn = document.getElementById("btn-agregar");
  if (!btn) return;
  const ok = S.form.texto.trim().length > 0;
  btn.style.background = ok ? "#1a1a1a" : "#E8E6E1";
  btn.style.color = ok ? "#fff" : "#aaa";
}

async function accionGuardar() {
  const texto = (S.form.texto || "").trim();
  if (!texto) { alert("Escribe el pendiente"); return; }
  const btn = document.getElementById("btn-agregar");
  if (btn) { btn.innerText = "Guardando..."; btn.style.opacity = ".6"; btn.disabled = true; }
  const obj = { texto, categoria: S.form.categoria, estado: "maestra", dia: null, meta_id: null, completado: false };
  try {
    const guardado = await dbGuardar(obj);
    if (guardado) S.tasks.push(guardado);
    S.form = formVacio();
    S.mostrarForm = false;
    render();
  } catch(e) {
    alert("Error al guardar: " + e.message);
    if (btn) { btn.innerText = "Agregar"; btn.style.opacity = "1"; btn.disabled = false; }
  }
}

async function recalcMeta(metaId) {
  if (!metaId) return;
  const todos = S.tasks.filter(t=>t.meta_id===metaId);
  const listo = todos.length>0 && todos.every(t=>t.completado);
  const m = S.metas.find(x=>x.id===metaId);
  if (!m || !!m.completado === listo) return;
  S.metas = S.metas.map(x=>x.id===metaId?{...x, completado:listo}:x);
  render();
  try { await dbActualizarMeta(metaId, {completado:listo}); } catch(e) { /* silencioso */ }
}

async function toggleMetaCompletado(id) {
  const m = S.metas.find(x=>x.id===id);
  if (!m) return;
  const nuevo = !m.completado;
  S.metas = S.metas.map(x=>x.id===id?{...x,completado:nuevo}:x);
  render();
  try { await dbActualizarMeta(id, {completado:nuevo}); } catch(e) { alert("Error: " + e.message); }
}

async function toggleCompletado(id) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  const nuevo = !t.completado;
  S.tasks = S.tasks.map(x=>x.id===id?{...x,completado:nuevo}:x);
  render();
  try { await dbActualizar(id, {completado:nuevo}); } catch(e) { alert("Error: " + e.message); }
  if (t.meta_id) recalcMeta(t.meta_id);
}

async function accionEliminar(id) {
  const t = S.tasks.find(x=>x.id===id);
  const metaIdAnterior = t ? t.meta_id : null;
  try {
    await dbEliminar(id);
    S.tasks = S.tasks.filter(t=>t.id!==id);
    S.eliminarId = null;
    render();
    if (metaIdAnterior) recalcMeta(metaIdAnterior);
  } catch(e) { alert("Error al eliminar: " + e.message); }
}

async function enviarASemana(id) {
  const obj = { estado:"semana", dia:null, meta_id:null };
  S.tasks = S.tasks.map(x=>x.id===id?{...x,...obj}:x);
  render();
  try { await dbActualizar(id, obj); } catch(e) { alert("Error: " + e.message); }
}

async function volverAMaestra(id) {
  const t = S.tasks.find(x=>x.id===id);
  const metaIdAnterior = t ? t.meta_id : null;
  const obj = { estado:"maestra", dia:null, meta_id:null };
  S.tasks = S.tasks.map(x=>x.id===id?{...x,...obj}:x);
  render();
  try { await dbActualizar(id, obj); } catch(e) { alert("Error: " + e.message); }
  if (metaIdAnterior) recalcMeta(metaIdAnterior);
}

async function moverTask(id, zona, extra) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  const metaIdAnterior = t.meta_id || null;
  let obj;
  if (zona === "bandeja") obj = { estado:"semana", dia:null, meta_id:null };
  else if (zona === "dia") obj = { estado:"semana", dia:extra, meta_id:null };
  else if (zona === "meta") obj = { estado:"semana", dia:null, meta_id:Number(extra) };
  else return;
  if (t.estado===obj.estado && (t.dia||null)===(obj.dia||null) && (t.meta_id||null)===(obj.meta_id||null)) return;
  S.tasks = S.tasks.map(x=>x.id===id?{...x,...obj}:x);
  render();
  try { await dbActualizar(id, obj); } catch(e) { alert("Error al mover: " + e.message); }
  if (metaIdAnterior) recalcMeta(metaIdAnterior);
  if (obj.meta_id) recalcMeta(obj.meta_id);
}

async function ejecutarPlanearSemana() {
  const semana = S.tasks.filter(t=>t.estado==='semana');
  const aEliminar = semana.filter(t=>t.completado);
  const incompletos = semana.filter(t=>!t.completado);
  const pasarAMaestra = S.opcionPasarMaestra;
  const borrarMetas = S.opcionBorrarMetas;
  S.confirmSemana = false;
  render();
  try {
    await Promise.all(aEliminar.map(t=>dbEliminar(t.id)));
    const eliminarIds = new Set(aEliminar.map(t=>t.id));
    let tasksNuevas = S.tasks.filter(t=>!eliminarIds.has(t.id));

    if (pasarAMaestra) {
      await Promise.all(incompletos.map(t=>dbActualizar(t.id, {estado:"maestra", dia:null, meta_id:null})));
      const regresarIds = new Set(incompletos.map(t=>t.id));
      tasksNuevas = tasksNuevas.map(t=> regresarIds.has(t.id) ? {...t, estado:"maestra", dia:null, meta_id:null} : t);
    }

    let metasNuevas = S.metas;
    if (borrarMetas) {
      await Promise.all(S.metas.map(m=>dbEliminarMeta(m.id)));
      metasNuevas = [];
      if (!pasarAMaestra) {
        tasksNuevas = tasksNuevas.map(t=> t.meta_id ? {...t, meta_id:null} : t);
      }
    }

    S.tasks = tasksNuevas;
    S.metas = metasNuevas;
    render();
  } catch(e) {
    alert("Error: " + e.message);
    render();
  }
}

function toggleMetaForm(catId) {
  S.metaFormCat = S.metaFormCat === catId ? null : catId;
  render();
  if (S.metaFormCat) setTimeout(() => { const i = document.getElementById("inp-meta-" + catId); if(i) i.focus(); }, 100);
}

async function guardarMeta(catId) {
  const inp = document.getElementById("inp-meta-" + catId);
  const texto = inp ? inp.value.trim() : "";
  if (!texto) return;
  try {
    const guardado = await dbGuardarMeta({ categoria: catId, texto });
    if (guardado) S.metas.push(guardado);
    S.metaFormCat = null;
    render();
  } catch(e) { alert("Error al guardar meta: " + e.message); }
}

async function eliminarMeta(id) {
  if (!confirm("¿Eliminar esta meta? Sus to dos volverán a 'To dos de la semana'.")) return;
  try {
    await dbEliminarMeta(id);
    S.metas = S.metas.filter(m=>m.id!==id);
    S.tasks = S.tasks.map(t=> t.meta_id===id ? {...t, meta_id:null} : t);
    render();
  } catch(e) { alert("Error: " + e.message); }
}

async function convertirEnMeta(id, catId) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  const metaIdAnterior = t.meta_id || null;
  try {
    const nuevaMeta = await dbGuardarMeta({ categoria: catId, texto: t.texto, completado: false });
    await dbEliminar(id);
    if (nuevaMeta) S.metas.push(nuevaMeta);
    S.tasks = S.tasks.filter(x=>x.id!==id);
    render();
    if (metaIdAnterior) recalcMeta(metaIdAnterior);
  } catch(e) { alert("Error al convertir en meta: " + e.message); }
}

async function guardarMetaTodo(metaId) {
  const inp = document.getElementById("inp-todo-" + metaId);
  const texto = inp ? inp.value.trim() : "";
  if (!texto) return;
  const m = S.metas.find(x=>x.id===metaId);
  const categoria = m ? m.categoria : "release";
  try {
    const guardado = await dbGuardar({ texto, categoria, estado:"semana", dia:null, meta_id:metaId, completado:false });
    if (guardado) S.tasks.push(guardado);
    render();
    setTimeout(() => { const i = document.getElementById("inp-todo-" + metaId); if(i) i.focus(); }, 100);
    recalcMeta(metaId);
  } catch(e) { alert("Error al guardar to do: " + e.message); }
}

let dragState = null;

function iniciarDrag(e, id) {
  e.preventDefault();
  const handle = e.currentTarget;
  try { handle.setPointerCapture(e.pointerId); } catch(err) {}
  const row = handle.closest(".task-row");
  if (!row) return;
  const rect = row.getBoundingClientRect();
  const ghost = row.cloneNode(true);
  ghost.style.position = "fixed";
  ghost.style.top = rect.top + "px";
  ghost.style.left = rect.left + "px";
  ghost.style.width = rect.width + "px";
  ghost.style.zIndex = "9999";
  ghost.style.pointerEvents = "none";
  ghost.style.boxShadow = "0 10px 30px rgba(0,0,0,.18)";
  ghost.style.borderRadius = "12px";
  ghost.style.transform = "scale(1.02) rotate(-1deg)";
  document.body.appendChild(ghost);
  row.style.opacity = "0.25";
  dragState = { id, ghost, row, startX:e.clientX, startY:e.clientY, origTop:rect.top, origLeft:rect.left, zoneEl:null };
  document.addEventListener("pointermove", moverDrag);
  document.addEventListener("pointerup", soltarDrag);
}

function moverDrag(e) {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  dragState.ghost.style.top = (dragState.origTop + dy) + "px";
  dragState.ghost.style.left = (dragState.origLeft + dx) + "px";
  dragState.ghost.style.display = "none";
  const el = document.elementFromPoint(e.clientX, e.clientY);
  dragState.ghost.style.display = "";
  document.querySelectorAll("[data-zone]").forEach(z=>z.classList.remove("zone-active"));
  const zoneEl = el ? el.closest("[data-zone]") : null;
  if (zoneEl) zoneEl.classList.add("zone-active");
  dragState.zoneEl = zoneEl;
}

function soltarDrag(e) {
  if (!dragState) return;
  document.removeEventListener("pointermove", moverDrag);
  document.removeEventListener("pointerup", soltarDrag);
  document.querySelectorAll("[data-zone]").forEach(z=>z.classList.remove("zone-active"));
  dragState.ghost.remove();
  if (dragState.row) dragState.row.style.opacity = "1";
  const { id, zoneEl } = dragState;
  dragState = null;
  if (zoneEl) {
    const zona = zoneEl.dataset.zone;
    if (zona === "dia") moverTask(id, "dia", zoneEl.dataset.dia);
    else if (zona === "meta") moverTask(id, "meta", zoneEl.dataset.meta);
    else if (zona === "bandeja") moverTask(id, "bandeja", null);
    else if (zona === "nueva-meta") convertirEnMeta(id, zoneEl.dataset.categoria);
  }
}

function iniciarApp() {
  document.getElementById("app").innerHTML = `
    <div style="min-height:100vh;background:#F7F6F3;display:flex;align-items:center;justify-content:center;">
      <p style="font-size:13px;color:#bbb;font-weight:500;letter-spacing:1px;">Cargando...</p>

    .then(([tasks, metas]) => { S.tasks = tasks || []; S.metas = metas || []; render(); })
    .catch(e => {
      document.getElementById("app").innerHTML = `
        <div style="min-height:100vh;background:#F7F6F3;display:flex;align-items:center;justify-content:center;padding:24px;">
          <p style="font-size:13px;color:#D94F3D;text-align:center;">Error al conectar:<br>${e.message}</p>
        </div>`;
    });
}

iniciarApp();
